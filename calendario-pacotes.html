<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendário de Pacotes — China Park 2026</title>
<style>
  :root {
    --navy:   #14143C;
    --green:  #3CA078;
    --gold:   #F0A014;
    --red:    #DC2828;
    --bg:     #F4F4F8;
    --line:   #E2E2EA;
    --ink:    #1B1B2A;
    --muted:  #6B6B80;
    --white:  #FFFFFF;

    /* category colors */
    --cat-feriado: #14143C;
    --cat-tema: #6E3FA8;
    --cat-festa-junina: #F0A014;
    --cat-sazonal: #3CA078;
    --cat-campanha: #DC2828;
    --cat-tema-feriado: #1F76C8;

    /* status colors */
    --st-planejado: #B5B5C2;
    --st-em-producao: #F0A014;
    --st-em-revisao: #C58A00;
    --st-pronto: #1F76C8;
    --st-concluido: #3CA078;
    --st-atrasado: #DC2828;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  header.app {
    background: var(--navy);
    color: var(--white);
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  header.app h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  header.app .sub {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 4px;
  }
  header.app .stat {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 12px;
  }
  header.app .stat b { font-size: 16px; display: block; color: var(--gold); }
  .stat-item { text-align: right; opacity: 0.95; }

  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .toolbar .group { display: flex; gap: 8px; align-items: center; }
  .toolbar label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .toolbar select, .toolbar button {
    border: 1px solid var(--line);
    background: var(--white);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .toolbar select:focus, .toolbar button:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .toolbar .view-toggle button {
    background: transparent;
    border-color: var(--line);
  }
  .toolbar .view-toggle button.active {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  main { padding: 24px 28px 60px; }

  /* ========== VISÃO ANUAL ========== */
  .year-strip {
    background: var(--white);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
    border: 1px solid var(--line);
    overflow-x: auto;
  }
  .year-strip h2 {
    margin: 0 0 14px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
  }
  .months-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(110px, 1fr));
    gap: 8px;
  }
  .month-col {
    border-radius: 8px;
    padding: 10px 8px;
    background: #FAFAFE;
    border: 1px solid var(--line);
    min-height: 140px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .month-col:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(20, 20, 60, 0.08); }
  .month-col.active {
    border-color: var(--navy);
    background: #fff;
    box-shadow: 0 6px 16px rgba(20, 20, 60, 0.10);
  }
  .month-col h3 {
    margin: 0 0 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .month-col .pkg-pill {
    display: block;
    padding: 4px 6px;
    font-size: 11px;
    border-radius: 4px;
    margin-bottom: 4px;
    color: white;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .month-col .pkg-pill:hover { filter: brightness(1.1); }
  .month-col .empty {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  /* ========== VISÃO MENSAL ========== */
  .month-view {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
  }
  @media (max-width: 1100px) {
    .month-view { grid-template-columns: 1fr; }
  }
  .calendar-card, .list-card {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .month-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .month-header h2 {
    margin: 0;
    font-size: 18px;
    color: var(--navy);
  }
  .month-nav {
    display: flex; gap: 6px;
  }
  .month-nav button {
    border: 1px solid var(--line);
    background: var(--white);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 14px;
    cursor: pointer;
    color: var(--navy);
  }
  .month-nav button:hover { background: var(--bg); }

  /* Calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--line);
    padding: 1px;
  }
  .cal-grid .dow {
    background: #FAFAFE;
    text-align: center;
    padding: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .cal-grid .day {
    background: var(--white);
    min-height: 80px;
    padding: 4px 6px;
    position: relative;
    font-size: 12px;
  }
  .cal-grid .day .day-num {
    color: var(--ink);
    font-weight: 600;
  }
  .cal-grid .day.outside .day-num {
    color: #C0C0CC;
  }
  .cal-grid .day.today {
    background: #FFFBEC;
  }
  .cal-grid .day.today .day-num {
    color: var(--gold);
    font-weight: 800;
  }
  .day-bar {
    position: relative;
    margin-top: 3px;
    padding: 2px 6px;
    border-radius: 3px;
    color: white;
    font-size: 10px;
    line-height: 1.2;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .day-bar:hover { filter: brightness(1.1); }

  /* List card */
  .list-card .month-header h2 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .pkg-list {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 600px;
    overflow-y: auto;
  }
  .pkg-card {
    border: 1px solid var(--line);
    border-left: 4px solid var(--cat-feriado);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--white);
  }
  .pkg-card:hover { box-shadow: 0 4px 10px rgba(20,20,60,0.06); transform: translateY(-1px); }
  .pkg-card .pkg-title {
    font-size: 13px; font-weight: 700; color: var(--navy);
    margin-bottom: 4px;
  }
  .pkg-card .pkg-meta {
    display: flex; gap: 10px; font-size: 11px; color: var(--muted);
    flex-wrap: wrap;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge-st-planejado    { background: #EBEBF1; color: #3F3F50; }
  .badge-st-em-producao  { background: #FFF1CD; color: #8A6D00; }
  .badge-st-em-revisao   { background: #FFE6A8; color: #6E5500; }
  .badge-st-pronto       { background: #DCEAFB; color: #14507F; }
  .badge-st-concluido    { background: #D6F0E1; color: #1F6F46; }
  .badge-st-atrasado     { background: #F8D7DA; color: #A1232C; }

  /* Buckets do mês */
  .bucket { padding: 4px 10px 8px; }
  .bucket-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 4px 6px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 6px;
  }
  .bucket-name {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--ink);
  }
  .bucket-count {
    background: var(--bg);
    color: var(--muted);
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 10px; font-weight: 700;
  }
  .bucket-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .bucket-dot.backlog { background: #B5B5C2; }
  .bucket-dot.fazendo { background: var(--gold); }
  .bucket-dot.no-ar   { background: var(--green); }
  .bucket-cards { display: flex; flex-direction: column; gap: 4px; }
  .bucket-empty {
    font-size: 11px; color: var(--muted); font-style: italic;
    padding: 4px 6px;
  }
  .pkg-mini {
    display: flex; gap: 8px; align-items: center;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-left: 4px solid var(--cat-feriado);
    border-radius: 6px;
    background: var(--white);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .pkg-mini:hover { box-shadow: 0 4px 10px rgba(20,20,60,0.06); transform: translateX(2px); }
  .pkg-mini .nome { font-size: 12px; font-weight: 600; color: var(--navy); flex: 1; }
  .pkg-mini .periodo { font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* Inputs status pills (usado no painel) */
  .pkg-inputs {
    display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
  }
  .input-pill {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--line);
    color: var(--muted);
  }
  .input-pill.ok    { background: #D6F0E1; color: #1F6F46; border-color: #B8E2C8; }
  .input-pill.pend  { background: #FFE3E3; color: #A1232C; border-color: #F4C2C2; }
  .input-pill.rev   { background: #FFF1CD; color: #8A6D00; border-color: #EFD68A; }

  /* ========== MODAL ========== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 60, 0.5);
    display: none;
    align-items: stretch;
    justify-content: flex-end;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .panel {
    background: var(--white);
    width: 480px;
    max-width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 28px;
    box-shadow: -8px 0 24px rgba(20,20,60,0.15);
    animation: slideIn 0.2s ease-out;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .panel .close {
    background: transparent;
    border: 0;
    font-size: 22px;
    cursor: pointer;
    color: var(--muted);
    float: right;
  }
  .panel h2 {
    margin: 0 0 6px;
    font-size: 22px;
    color: var(--navy);
    line-height: 1.2;
  }
  .panel .panel-meta {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .panel-section {
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 14px;
  }
  .panel-section h3 {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 0 0 10px;
  }
  .panel-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px dashed var(--line);
  }
  .panel-row:last-child { border-bottom: 0; }
  .panel-row .label { color: var(--ink); }
  .panel-row .value { color: var(--muted); font-weight: 600; }

  .blocks-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .block-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 10px;
    background: #FAFAFE;
    border-radius: 6px;
    font-size: 12px;
  }
  .block-num {
    background: var(--navy);
    color: white;
    font-weight: 700;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .block-body { flex: 1; }
  .block-title { font-weight: 700; color: var(--ink); }
  .block-desc { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .block-resp { font-size: 10px; color: var(--green); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

  .copy-btn {
    background: var(--navy);
    color: white;
    border: 0;
    padding: 9px 14px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 6px;
  }
  .copy-btn:hover { background: #1F1F50; }
  .copy-btn.green { background: var(--green); }
  .link-block {
    background: #FAFAFE;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: monospace;
    font-size: 11px;
    word-break: break-all;
    margin-bottom: 6px;
  }

  /* Legend */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 11px; color: var(--muted);
  }
  .legend .item { display: flex; gap: 6px; align-items: center; }
  .legend .swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* ========== FORM ========== */
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
    border: 0;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:hover { background: #FFB430; }
  .btn-secondary {
    background: var(--white);
    color: var(--navy);
    border: 1px solid var(--line);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-danger {
    background: var(--white);
    color: var(--red);
    border: 1px solid #F4C2C2;
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-danger:hover { background: #FFE3E3; }

  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field input, .field select, .field textarea {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 11px;
    font-size: 13px;
    font-family: inherit;
    color: var(--ink);
    background: var(--white);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: 2px solid var(--gold);
    outline-offset: 1px;
    border-color: var(--gold);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-help { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .input-pill.clickable { cursor: pointer; user-select: none; }
  .input-pill.clickable:hover { filter: brightness(0.95); }

  .panel-actions {
    display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap;
  }

  .toolbar-actions {
    display: flex; gap: 8px;
  }

  /* Mobile tweaks */
  @media (max-width: 720px) {
    header.app { padding: 14px 16px; }
    header.app h1 { font-size: 15px; }
    .toolbar { padding: 10px 16px; }
    main { padding: 14px 16px 40px; }
    .months-grid { grid-template-columns: repeat(3, 1fr); }
    .panel { width: 100%; padding: 18px; }
    .cal-grid .day { min-height: 56px; }
    .day-bar { font-size: 9px; padding: 1px 4px; }
  }
</style>
</head>
<body>

<header class="app">
  <div>
    <h1>Calendário de Pacotes — China Park 2026</h1>
    <div class="sub">Console de produção · clique em um pacote para ver entregas e gerar links</div>
  </div>
  <div class="stat">
    <div class="stat-item"><b id="stat-total">—</b>pacotes no ano</div>
    <div class="stat-item"><b id="stat-prod">—</b>em produção</div>
    <div class="stat-item"><b id="stat-pend">—</b>planejados</div>
  </div>
</header>

<section class="toolbar">
  <div class="group">
    <label>Status</label>
    <select id="filter-status">
      <option value="">Todos</option>
      <option>Planejado</option>
      <option>Em produção</option>
      <option>Em revisão</option>
      <option>Pronto p/ publicar</option>
      <option>Concluído</option>
      <option>Atrasado</option>
    </select>
  </div>
  <div class="group">
    <label>Categoria</label>
    <select id="filter-categoria">
      <option value="">Todas</option>
      <option>Feriado</option>
      <option>Tema</option>
      <option>Tema/Feriado</option>
      <option>Festa Junina</option>
      <option>Sazonal</option>
      <option>Campanha</option>
    </select>
  </div>
  <div class="group">
    <span class="legend">
      <span class="item"><span class="swatch" style="background:var(--cat-feriado)"></span>Feriado</span>
      <span class="item"><span class="swatch" style="background:var(--cat-tema)"></span>Tema</span>
      <span class="item"><span class="swatch" style="background:var(--cat-tema-feriado)"></span>Tema/Feriado</span>
      <span class="item"><span class="swatch" style="background:var(--cat-festa-junina)"></span>Festa Junina</span>
      <span class="item"><span class="swatch" style="background:var(--cat-sazonal)"></span>Sazonal</span>
      <span class="item"><span class="swatch" style="background:var(--cat-campanha)"></span>Campanha</span>
    </span>
  </div>
  <div class="toolbar-actions" style="margin-left:auto">
    <button class="btn-secondary" id="btn-export" title="Baixar JSON dos pacotes">⬇ Exportar</button>
    <button class="btn-secondary" id="btn-import" title="Carregar JSON">⬆ Importar</button>
    <input type="file" id="file-import" accept=".json" style="display:none" />
    <button class="btn-primary" id="btn-novo">+ Novo pacote</button>
  </div>
</section>

<main>
  <!-- Visão anual -->
  <section class="year-strip">
    <h2>2026 · visão anual</h2>
    <div class="months-grid" id="year-grid"></div>
  </section>

  <!-- Visão mensal -->
  <section class="month-view">
    <div class="calendar-card">
      <div class="month-header">
        <h2 id="month-title">—</h2>
        <div class="month-nav">
          <button id="prev-month">←</button>
          <button id="this-month">Hoje</button>
          <button id="next-month">→</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="list-card">
      <div class="month-header">
        <h2>Pacotes — visão geral</h2>
        <span style="font-size:11px;color:var(--muted)" id="list-count">0 itens</span>
      </div>
      <div class="pkg-list" id="pkg-list"></div>
    </div>
  </section>
</main>

<!-- Painel lateral -->
<div class="overlay" id="overlay">
  <aside class="panel" id="panel"></aside>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO (espelho da aba "Configurações" do xlsx)
// ============================================================
const CONFIG = {
  // URL real do motor de reservas China Park (Omnibees)
  RESERVA_BASE:   "https://reservas.chinapark.com.br/hotels/HOTEL_OMNI_10771",
  RESERVA_PARAMS: "adults=1&children=0&clientId=3b5e8937-c0b8-4a0d-a47d-0661f579f448&clientName=MOTOR%20de%20RESERVAS&contentType=property&destinationCountry=BR&destinationName=China%20Park%20Eco%20Resort&enablePromoCode=true&hotelIds[]=HOTEL_OMNI_10771&personName=&propertyId=70ddd1b2-2638-4128-842b-b6275e4ab7ed&rooms[]=a1",
  ANO: 2026,
};

// Modo somente-leitura (diretoria). Ative com ?view=readonly na URL.
const READONLY = new URLSearchParams(window.location.search).get("view") === "readonly";

// ============================================================
// DATASET DOS PACOTES (seed inicial — espelho do xlsx)
// Após primeira carga, a fonte de verdade passa a ser o localStorage.
// ============================================================
const STORAGE_KEY = "chinapark_pacotes_v9";

// Carrega do localStorage; se não existir, usa o seed
function carregarPacotes() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn("localStorage falhou, usando seed", e); }
  return JSON.parse(JSON.stringify(SEED_PACOTES));
}
function salvarPacotes() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(PACOTES)); }
  catch (e) { console.warn("Falha ao salvar:", e); }
}

const state = {
  cursor: new Date(2026, 4, 1), // mês exibido — começa em maio (próximo a sair)
  filtroStatus: "",
  filtroCategoria: "",
};

const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const mesesAbrev = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const dows = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

const catKey = (c) => ({
  "Feriado":"feriado","Tema":"tema","Tema/Feriado":"tema-feriado",
  "Festa Junina":"festa-junina","Sazonal":"sazonal","Campanha":"campanha"
})[c] || "feriado";

const stKey = (s) => ({
  "Planejado":"planejado","Em produção":"em-producao","Em revisão":"em-revisao",
  "Pronto p/ publicar":"pronto","Concluído":"concluido","Atrasado":"atrasado"
})[s] || "planejado";

const parseDate = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const fmtBR = (d) => `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
const fmtPretty = (s) => {
  const d = parseDate(s);
  return `${String(d.getDate()).padStart(2,"0")} de ${meses[d.getMonth()].toLowerCase()}`;
};

function reservaURL(p) {
  // Datas em YYYY-MM-DD (formato nativo do nosso dataset, igual ao motor)
  return `${CONFIG.RESERVA_BASE}#${CONFIG.RESERVA_PARAMS}&startDate=${p.inicio}&endDate=${p.fim}`;
}

function pkgFiltrado(p) {
  if (state.filtroStatus && p.status !== state.filtroStatus) return false;
  if (state.filtroCategoria && p.categoria !== state.filtroCategoria) return false;
  return true;
}

function pacotesNoMes(mIdx, ano) {
  return PACOTES.filter(p => {
    const di = parseDate(p.inicio); const df = parseDate(p.fim);
    const inicioMes = new Date(ano, mIdx, 1);
    const fimMes = new Date(ano, mIdx+1, 0);
    return df >= inicioMes && di <= fimMes;
  });
}

function renderYearGrid() {
  const grid = document.getElementById("year-grid");
  grid.innerHTML = "";
  for (let m = 0; m < 12; m++) {
    const col = document.createElement("div");
    col.className = "month-col" + (m === state.cursor.getMonth() ? " active" : "");
    col.onclick = () => { state.cursor = new Date(CONFIG.ANO, m, 1); render(); };
    const lista = pacotesNoMes(m, CONFIG.ANO).filter(pkgFiltrado);
    col.innerHTML = `<h3>${mesesAbrev[m]}</h3>` +
      (lista.length === 0
        ? `<div class="empty">—</div>`
        : lista.map(p => `<span class="pkg-pill" data-id="${p.id}" style="background:var(--cat-${catKey(p.categoria)})" title="${p.nome}">${p.nome}</span>`).join(""));
    grid.appendChild(col);
  }
  grid.querySelectorAll(".pkg-pill").forEach(el => {
    el.addEventListener("click", (e) => { e.stopPropagation(); abrirPanel(+el.dataset.id); });
  });
}

// RENDER — visão mensal
// ============================================================
function renderMonthHeader() {
  document.getElementById("month-title").textContent = `${meses[state.cursor.getMonth()]} ${state.cursor.getFullYear()}`;
}

function renderCalGrid() {
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";
  // Day-of-week header
  dows.forEach(d => {
    const dh = document.createElement("div");
    dh.className = "dow"; dh.textContent = d;
    grid.appendChild(dh);
  });

  const mIdx = state.cursor.getMonth();
  const ano = state.cursor.getFullYear();
  const firstDay = new Date(ano, mIdx, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(ano, mIdx+1, 0).getDate();
  const daysInPrev = new Date(ano, mIdx, 0).getDate();
  const today = new Date();

  // Previous spillover
  for (let i = startWeekday - 1; i >= 0; i--) {
    const d = document.createElement("div");
    d.className = "day outside";
    d.innerHTML = `<span class="day-num">${daysInPrev - i}</span>`;
    grid.appendChild(d);
  }
  // Current month
  const lista = pacotesNoMes(mIdx, ano).filter(pkgFiltrado);
  for (let i = 1; i <= daysInMonth; i++) {
    const d = document.createElement("div");
    const dt = new Date(ano, mIdx, i);
    const isToday = dt.toDateString() === today.toDateString();
    d.className = "day" + (isToday ? " today" : "");
    d.innerHTML = `<span class="day-num">${i}</span>`;
    // Add bars
    lista.forEach(p => {
      const di = parseDate(p.inicio); const df = parseDate(p.fim);
      if (dt >= di && dt <= df) {
        const bar = document.createElement("span");
        bar.className = "day-bar";
        bar.style.background = `var(--cat-${catKey(p.categoria)})`;
        bar.dataset.id = p.id;
        bar.textContent = p.nome;
        bar.addEventListener("click", () => abrirPanel(p.id));
        d.appendChild(bar);
      }
    });
    grid.appendChild(d);
  }
  // Next spillover (até completar 42 = 6 semanas)
  const totalCelulas = startWeekday + daysInMonth;
  const remainder = (7 - (totalCelulas % 7)) % 7;
  for (let i = 1; i <= remainder; i++) {
    const d = document.createElement("div");
    d.className = "day outside";
    d.innerHTML = `<span class="day-num">${i}</span>`;
    grid.appendChild(d);
  }
}

function bucketDe(p) {
  if (p.status === "Concluído") return "no-ar";
  if (p.status === "Planejado") return "backlog";
  return "fazendo"; // Em produção, Em revisão, Pronto p/ publicar, Atrasado
}

function renderPkgList() {
  const list = document.getElementById("pkg-list");
  // Lista global — todos os pacotes do ano. Filtros do toolbar (status/categoria) aplicam.
  // Pacotes "Concluído" cuja data já passou são ocultados (já não estão no ar).
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  const lista = PACOTES.filter(p => {
    if (!pkgFiltrado(p)) return false;
    if (p.status === "Concluído" && parseDate(p.fim) < hoje) return false;
    return true;
  });
  document.getElementById("list-count").textContent = `${lista.length} ${lista.length === 1 ? "item" : "itens"}`;

  const buckets = {
    "backlog": { nome: "Backlog",  itens: [] },
    "fazendo": { nome: "Fazendo",  itens: [] },
    "no-ar":   { nome: "No ar",    itens: [] },
  };
  lista.forEach(p => buckets[bucketDe(p)].itens.push(p));

  list.innerHTML = Object.entries(buckets).map(([key, b]) => {
    const cards = b.itens.length === 0
      ? `<div class="bucket-empty">— vazio —</div>`
      : b.itens.map(p => {
          const di = parseDate(p.inicio); const df = parseDate(p.fim);
          const periodo = `${String(di.getDate()).padStart(2,"0")}/${String(di.getMonth()+1).padStart(2,"0")} → ${String(df.getDate()).padStart(2,"0")}/${String(df.getMonth()+1).padStart(2,"0")}`;
          return `
            <div class="pkg-mini" data-id="${p.id}" style="border-left-color: var(--cat-${catKey(p.categoria)})">
              <span class="nome">${p.nome}</span>
              <span class="periodo">${periodo}</span>
            </div>`;
        }).join("");
    return `
      <div class="bucket">
        <div class="bucket-header">
          <span class="bucket-dot ${key}"></span>
          <span class="bucket-name">${b.nome}</span>
          <span class="bucket-count">${b.itens.length}</span>
        </div>
        <div class="bucket-cards">${cards}</div>
      </div>`;
  }).join("");

  list.querySelectorAll(".pkg-mini").forEach(card => {
    card.addEventListener("click", () => abrirPanel(+card.dataset.id));
  });
}

function abrirPanel(id) {
  const p = PACOTES.find(x => x.id === id);
  if (!p) return;
  const di = parseDate(p.inicio); const df = parseDate(p.fim);
  const dias = Math.round((df - di)/(1000*60*60*24)) + 1;
  const url = reservaURL(p);
  const slugFull = `chinapark.com.br/tarifas/${p.slug}`;
  const parcela = Math.round(p.preco / 10);

  const inputsRows = ["datas","preco","arte","imagem","programacao","copy"].map(k => {
    const v = p.inputs[k];
    const lbl = { datas:"Datas (André)", preco:"Preço (André)", arte:"Arte (Designer)", imagem:"Imagem (Diretora)", programacao:"Programação (Recreação)", copy:"Copy (André)" }[k];
    const cls = v === "ok" ? "ok" : v === "rev" ? "rev" : "pend";
    const txt = v === "ok" ? "✓ Aprovado" : v === "rev" ? "◐ Em revisão" : "○ Pendente";
    return READONLY
      ? `<div class="panel-row"><span class="label">${lbl}</span><span class="input-pill ${cls}">${txt}</span></div>`
      : `<div class="panel-row"><span class="label">${lbl}</span><span class="input-pill clickable ${cls}" onclick="toggleInput(${p.id}, '${k}')" title="Clique para alternar">${txt}</span></div>`;
  }).join("");

  document.getElementById("panel").innerHTML = `
    <button class="close" onclick="fecharPanel()">×</button>
    <h2>${p.nome}</h2>
    <div class="panel-meta">
      <span class="badge badge-st-${stKey(p.status)}">${p.status}</span>
      <span style="margin-left:8px">${fmtPretty(p.inicio)} a ${fmtPretty(p.fim)} (${dias} dias)</span>
    </div>
    ${READONLY ? "" : `<div class="panel-actions">
      <button class="btn-secondary" onclick="abrirForm(${p.id})">✎ Editar</button>
      <button class="btn-danger" onclick="removerPacote(${p.id})">🗑 Excluir</button>
    </div>`}

    <div class="panel-section">
      <h3>Resumo</h3>
      <div class="panel-row"><span class="label">Categoria</span><span class="value">${p.categoria}</span></div>
      <div class="panel-row"><span class="label">Slug URL</span><span class="value">${p.slug}</span></div>
      <div class="panel-row"><span class="label">Preço (modelo)</span><span class="value">R$ ${p.preco.toLocaleString("pt-BR")}</span></div>
      <div class="panel-row"><span class="label">Parcelamento</span><span class="value">10x R$ ${parcela.toLocaleString("pt-BR")}</span></div>
      ${p.notas ? `<div class="panel-row"><span class="label">Notas</span><span class="value" style="text-align:right">${p.notas}</span></div>` : ``}
    </div>

    <div class="panel-section">
      <h3>Status das entregas${READONLY ? "" : ` <span style="font-weight:400;text-transform:none;font-size:10px;letter-spacing:0;color:var(--muted)">(clique pra alternar)</span>`}</h3>
      ${inputsRows}
    </div>

    <div class="panel-section">
      <h3>URL completa do site</h3>
      <div class="link-block">https://${slugFull}</div>
      <button class="copy-btn" onclick="copiar('https://${slugFull}', this)">Copiar URL</button>
    </div>

    <div class="panel-section">
      <h3>Link de reserva (OmniBees)</h3>
      <div class="link-block">${url}</div>
      <button class="copy-btn green" onclick="copiar(${JSON.stringify(url)}, this)">Copiar link de reserva</button>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">
        Motor de reservas oficial do China Park (Omnibees) com check-in e check-out já preenchidos.
      </div>
    </div>

    <div class="panel-section">
      <h3>Os 10 blocos da página</h3>
      <div class="blocks-list">
        ${BLOCOS.map(b => `
          <div class="block-item">
            <div class="block-num">${b.n}</div>
            <div class="block-body">
              <div class="block-title">${b.titulo}</div>
              <div class="block-desc">${b.desc}</div>
              <div class="block-resp">${b.resp}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="panel-section">
      <h3>Regras</h3>
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        URLs no padrão <code>chinapark.com.br/tarifas/pacote-[nome]</code>.<br>
        Meta description sem datas. Sem travessões. Sem "vagas limitadas". Sem superlativos.
        Dois links de reserva por página (banner de datas + CTA final).
        Preço parcelado em destaque (vermelho ou cor do evento).
      </div>
    </div>
  `;
  document.getElementById("overlay").classList.add("show");
}

function fecharPanel() {
  document.getElementById("overlay").classList.remove("show");
}

function copiar(texto, btn) {
  navigator.clipboard.writeText(texto).then(() => {
    const old = btn.textContent;
    btn.textContent = "Copiado ✓";
    setTimeout(() => { btn.textContent = old; }, 1400);
  });
}

document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") fecharPanel();
});

// ============================================================
// CRUD — criar / editar / excluir / toggle
// ============================================================
function novoId() {
  return PACOTES.length === 0 ? 1 : Math.max(...PACOTES.map(p => p.id)) + 1;
}

function slugify(s) {
  return s.toString().toLowerCase().normalize("NFD")
    .replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9\s-]/g, "")
    .trim().replace(/\s+/g, "-").replace(/-+/g, "-");
}

function abrirForm(id) {
  const isEdit = id != null;
  const p = isEdit ? PACOTES.find(x => x.id === id) : {
    id: novoId(),
    nome: "",
    categoria: "Feriado",
    inicio: "",
    fim: "",
    slug: "",
    preco: 0,
    status: "Planejado",
    inputs: { datas:"pend", preco:"pend", arte:"pend", imagem:"pend", programacao:"pend", copy:"pend" },
    notas: "",
  };

  document.getElementById("panel").innerHTML = `
    <button class="close" onclick="fecharPanel()">×</button>
    <h2>${isEdit ? "Editar pacote" : "Novo pacote"}</h2>
    <div class="panel-meta">${isEdit ? "Atualizar dados deste pacote" : "Adicionar pacote ao calendário 2026"}</div>

    <div class="panel-section">
      <form id="form-pacote">
        <input type="hidden" name="id" value="${p.id}" />
        <div class="form-grid">
          <div class="field full">
            <label>Nome do pacote</label>
            <input type="text" name="nome" value="${p.nome.replace(/"/g,'&quot;')}" required placeholder="ex: Jantar Italiano" />
          </div>
          <div class="field">
            <label>Categoria</label>
            <select name="categoria" required>
              ${["Feriado","Tema","Tema/Feriado","Festa Junina","Sazonal","Campanha"].map(c =>
                `<option ${c===p.categoria?"selected":""}>${c}</option>`).join("")}
            </select>
          </div>
          <div class="field">
            <label>Status geral</label>
            <select name="status" required>
              ${["Planejado","Em produção","Em revisão","Pronto p/ publicar","Concluído","Atrasado"].map(s =>
                `<option ${s===p.status?"selected":""}>${s}</option>`).join("")}
            </select>
          </div>
          <div class="field">
            <label>Data início</label>
            <input type="date" name="inicio" value="${p.inicio}" required />
          </div>
          <div class="field">
            <label>Data fim</label>
            <input type="date" name="fim" value="${p.fim}" required />
          </div>
          <div class="field full">
            <label>Slug da URL</label>
            <input type="text" name="slug" value="${p.slug}" required placeholder="ex: pacote-jantar-italiano" />
            <span class="field-help">URL final: chinapark.com.br/tarifas/<b id="slug-preview">${p.slug || "..."}</b></span>
          </div>
          <div class="field full">
            <label>Preço modelo (R$)</label>
            <input type="number" name="preco" value="${p.preco || ""}" required min="0" placeholder="ex: 1290" />
            <span class="field-help">Parcela 10x calculada automática: <b id="parc-preview">R$ ${Math.round((p.preco||0)/10).toLocaleString("pt-BR")}</b></span>
          </div>
          <div class="field full">
            <label>Notas (opcional)</label>
            <textarea name="notas" placeholder="ex: Combinado com Dia das Mães">${p.notas || ""}</textarea>
          </div>
        </div>
      </form>
    </div>

    <div class="panel-section">
      <h3>Status inicial das entregas</h3>
      <div id="form-inputs">
        ${["datas","preco","arte","imagem","programacao","copy"].map(k => {
          const v = p.inputs[k];
          const lbl = { datas:"Datas (André)", preco:"Preço (André)", arte:"Arte (Designer)", imagem:"Imagem (Diretora)", programacao:"Programação (Recreação)", copy:"Copy (André)" }[k];
          const cls = v === "ok" ? "ok" : v === "rev" ? "rev" : "pend";
          const txt = v === "ok" ? "✓ Aprovado" : v === "rev" ? "◐ Em revisão" : "○ Pendente";
          return `<div class="panel-row"><span class="label">${lbl}</span>
            <span class="input-pill clickable ${cls}" data-key="${k}" data-state="${v}" onclick="toggleFormInput(this)">${txt}</span></div>`;
        }).join("")}
      </div>
    </div>

    <div class="panel-actions">
      <button class="btn-primary" onclick="salvarForm()">💾 Salvar</button>
      <button class="btn-secondary" onclick="fecharPanel()">Cancelar</button>
    </div>
  `;
  document.getElementById("overlay").classList.add("show");

  // Auto-slug from nome
  const formEl = document.getElementById("form-pacote");
  formEl.querySelector('[name="nome"]').addEventListener("input", (e) => {
    const slugInput = formEl.querySelector('[name="slug"]');
    if (!slugInput.dataset.touched) {
      const v = "pacote-" + slugify(e.target.value);
      slugInput.value = v;
      document.getElementById("slug-preview").textContent = v;
    }
  });
  formEl.querySelector('[name="slug"]').addEventListener("input", (e) => {
    e.target.dataset.touched = "1";
    document.getElementById("slug-preview").textContent = e.target.value || "...";
  });
  formEl.querySelector('[name="preco"]').addEventListener("input", (e) => {
    const n = parseInt(e.target.value || 0);
    document.getElementById("parc-preview").textContent = "R$ " + Math.round(n/10).toLocaleString("pt-BR");
  });
}

function toggleFormInput(el) {
  const cur = el.dataset.state;
  const next = cur === "pend" ? "rev" : cur === "rev" ? "ok" : "pend";
  const cls = next === "ok" ? "ok" : next === "rev" ? "rev" : "pend";
  const txt = next === "ok" ? "✓ Aprovado" : next === "rev" ? "◐ Em revisão" : "○ Pendente";
  el.dataset.state = next;
  el.className = `input-pill clickable ${cls}`;
  el.textContent = txt;
}

function salvarForm() {
  const f = document.getElementById("form-pacote");
  if (!f.reportValidity()) return;
  const data = Object.fromEntries(new FormData(f).entries());
  const id = parseInt(data.id);

  if (data.fim < data.inicio) {
    alert("A data de fim não pode ser antes da de início.");
    return;
  }

  const inputs = {};
  document.querySelectorAll("#form-inputs .input-pill").forEach(el => {
    inputs[el.dataset.key] = el.dataset.state;
  });

  const novo = {
    id,
    nome: data.nome.trim(),
    categoria: data.categoria,
    inicio: data.inicio,
    fim: data.fim,
    slug: data.slug.trim(),
    preco: parseInt(data.preco) || 0,
    status: data.status,
    inputs,
    notas: (data.notas || "").trim(),
  };

  const idx = PACOTES.findIndex(x => x.id === id);
  if (idx >= 0) PACOTES[idx] = novo;
  else PACOTES.push(novo);

  // Mover cursor pro mês do pacote
  state.cursor = parseDate(novo.inicio);
  state.cursor.setDate(1);

  salvarPacotes();
  fecharPanel();
  render();
}

function removerPacote(id) {
  const p = PACOTES.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`Excluir "${p.nome}"? Essa ação não pode ser desfeita.`)) return;
  PACOTES = PACOTES.filter(x => x.id !== id);
  salvarPacotes();
  fecharPanel();
  render();
}

function toggleInput(id, key) {
  const p = PACOTES.find(x => x.id === id);
  if (!p) return;
  const cur = p.inputs[key];
  p.inputs[key] = cur === "pend" ? "rev" : cur === "rev" ? "ok" : "pend";
  salvarPacotes();
  abrirPanel(id); // re-render painel
  render();       // re-render lista/calendário
}

function exportarJSON() {
  const blob = new Blob([JSON.stringify(PACOTES, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `pacotes-china-park-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importarJSON(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error("JSON inválido");
      if (!confirm(`Importar ${data.length} pacotes? Isso vai substituir os atuais.`)) return;
      PACOTES = data;
      salvarPacotes();
      render();
      alert("Importado com sucesso.");
    } catch (err) {
      alert("Arquivo inválido: " + err.message);
    }
  };
  reader.readAsText(file);
}

// ============================================================
// EVENTOS
// ============================================================
if (READONLY) {
  // Esconde botões de admin na toolbar
  ["btn-novo", "btn-export", "btn-import"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });
  // Adiciona indicador visual
  const sub = document.querySelector("header.app .sub");
  if (sub) sub.textContent = "Visão diretoria · somente leitura";
} else {
  document.getElementById("btn-novo").addEventListener("click", () => abrirForm(null));
  document.getElementById("btn-export").addEventListener("click", exportarJSON);
  document.getElementById("btn-import").addEventListener("click", () => {
    document.getElementById("file-import").click();
  });
  document.getElementById("file-import").addEventListener("change", (e) => {
    if (e.target.files[0]) importarJSON(e.target.files[0]);
    e.target.value = "";
  });
}

document.getElementById("prev-month").addEventListener("click", () => {
  state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() - 1, 1);
  render();
});
document.getElementById("next-month").addEventListener("click", () => {
  state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() + 1, 1);
  render();
});
document.getElementById("this-month").addEventListener("click", () => {
  state.cursor = new Date();
  render();
});
document.getElementById("filter-status").addEventListener("change", (e) => {
  state.filtroStatus = e.target.value; render();
});
document.getElementById("filter-categoria").addEventListener("change", (e) => {
  state.filtroCategoria = e.target.value; render();
});

// ============================================================
// RENDER MASTER
// ============================================================
function render() {
  renderStats();
  renderYearGrid();
  renderMonthHeader();
  renderCalGrid();
  renderPkgList();
}
render();
</script>
</body>
</html>
